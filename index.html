<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>자기소개</title>

    <style>
        body {
            margin: 0;
            font-family: "맑은 고딕", sans-serif;
            background: linear-gradient(to right, #e0eafc, #cfdef3);
        }

        .card {
            width: 360px;
            margin: 100px auto;
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
            text-align: center;
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 15px;
            border: 3px solid #2c7be5;
        }

        h1 {
            margin-bottom: 10px;
            color: #333;
        }

        .name {
            color: #2c7be5;
            font-weight: bold;
        }

        .info {
            margin-top: 20px;
            text-align: left;
        }

        .info p {
            margin: 8px 0;
            color: #555;
        }

        .label {
            font-weight: bold;
            color: #222;
        }

        .footer {
            margin-top: 20px;
            font-size: 13px;
            color: #888;
        }

        .action {
            margin-top: 15px;
            display: flex;
            justify-content: center;
            gap: 8px;
        }

        .btn {
            padding: 8px 15px;
            background-color: #2c7be5;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 14px;
            border: none;
            cursor: pointer;
        }

        .btn:hover {
            background-color: #1a5edb;
        }

        .password-input {
            padding: 8px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 14px;
            width: 120px;
        }
    </style>
</head>

<body>

    <div class="card">

        <h1>자기소개</h1>
        <p>안녕하세요 </p>
        <p>저는 <span class="name">홍길동</span>입니다.</p>

        <div class="info">
            <p><span class="label">학년:</span> 대학교 n학년</p>
            <p><span class="label">전공:</span> ~~~~~~과</p>
            <p><span class="label">수업:</span> 웹 프로그래밍의 기초와 이해</p>
            <p><span class="label">취미:</span> 코딩</p>
            <p><span class="label">목표:</span> 꾸준히 성장하는 학생이 되기</p>
        </div>

        <!-- 버튼 + 비밀번호 입력 -->
        <div class="action">
            <input type="password" placeholder="비밀번호" class="password-input">
            <button class="btn">더 알아보기</button>
        </div>

        <div class="footer">
            감사합니다!
        </div>
    </div>

</body>
</html>
