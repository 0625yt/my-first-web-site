<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>자기소개</title>

<!-- CSS -->
<style>
    body {
        background-color: #eef2f3;
        font-family: "맑은 고딕", sans-serif;
        text-align: center;
    }

    .container {
        width: 350px;
        margin: 100px auto;
        background-color: white;
        padding: 20px;
        border-radius: 10px;
        border: 1px solid #ddd;
    }

    h1 {
        color: #333;
    }

    .name {
        color: blue;
        font-weight: bold;
    }

    ul {
        list-style: none;
        padding: 0;
    }

    li {
        margin: 5px 0;
    }
</style>
</head>

<body>

<div class="container">
    <h1>자기소개</h1>

    <p>안녕하세요! 저는 <span class="name">홍길동</span>입니다.</p>
    <p>웹프로그래밍의 기초와 이해</p>

    <h3>나의 정보</h3>
    <ul>
        <li>전공: 컴퓨터공학부</li>
        <li>취미: 코딩</li>
        <li>목표: 열심히 공부하기</li>
    </ul>
</div>

</body>
</html>
